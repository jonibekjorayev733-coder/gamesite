version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gamesite-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jonibek
      POSTGRES_DB: gamesite_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gamesite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gamesite-pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gamesite.com
      PGADMIN_DEFAULT_PASSWORD: jonibek
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gamesite-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  gamesite-network:
    driver: bridge
